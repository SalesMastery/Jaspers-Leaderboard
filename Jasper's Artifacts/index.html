<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Rep Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=block" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808; --surface: #0f0f0f; --border: #1c1c1c; --muted: #2a2a2a;
    --text: #e8e8e8; --sub: #555; --amber: #F0A500; --green: #22C55E;
    --red: #EF4444; --blue: #4A9EFF;
    --bb: 'Bebas Neue', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: monospace; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--muted); }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input::placeholder { color: #333; }

  /* HEADER */
  #header { border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 10px; }
  .sub-label { font-size: 9px; color: var(--sub); letter-spacing: .2em; text-transform: uppercase; margin-bottom: 2px; }
  .title { font-family: var(--bb); font-size: 20px; letter-spacing: .04em; }
  .title span { color: var(--amber); }
  #header-btns { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .divider { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }

  /* TABS */
  #tabs { border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  #tabs::-webkit-scrollbar { display: none; }
  .tab { background: none; border: none; cursor: pointer; font-family: monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; padding: 11px 14px; color: var(--sub); border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; }
  .tab.active { color: var(--amber); border-bottom-color: var(--amber); }

  /* CONTENT */
  #content { flex: 1; overflow-y: auto; padding: 16px 20px; }

  /* BUTTONS */
  .vb { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 6px 12px; cursor: pointer; font-family: monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--sub); transition: all .15s; white-space: nowrap; }
  .vb:hover, .vb:active { border-color: var(--muted); color: var(--text); }
  .vb.act { border-color: var(--amber); color: var(--amber); background: #F0A50010; }
  .sb { background: none; border: 1px solid var(--border); border-radius: 3px; padding: 4px 8px; cursor: pointer; font-family: monospace; font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--sub); transition: all .12s; white-space: nowrap; }
  .sb.act { border-color: var(--amber); color: var(--amber); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--sub); font-size: 14px; padding: 6px 8px; border-radius: 3px; transition: color .15s; }
  .del-btn:hover, .del-btn:active { color: var(--red); }
  .edit-btn { background: none; border: none; cursor: pointer; color: var(--sub); font-size: 12px; padding: 6px 8px; border-radius: 3px; font-family: monospace; transition: color .15s; }
  .edit-btn:hover, .edit-btn:active { color: var(--amber); }

  /* SECTION HEADER */
  .section-hdr { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .section-bar { width: 2px; height: 14px; border-radius: 1px; flex-shrink: 0; margin-top: 2px; }
  .section-label { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; }
  .sort-btns { display: flex; gap: 4px; flex-wrap: wrap; }

  /* PODIUM */
  .podium { display: flex; gap: 10px; margin-bottom: 14px; }
  .podium-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px 12px; position: relative; min-width: 0; }
  .podium-rank { position: absolute; top: 10px; right: 10px; font-size: 10px; font-family: var(--bb); letter-spacing: .1em; }
  .podium-role { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 2px; }
  .podium-name { font-size: 16px; font-family: var(--bb); color: var(--text); margin-bottom: 6px; padding-right: 36px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .podium-val  { font-size: 24px; font-family: var(--bb); line-height: 1; margin-bottom: 8px; }
  .podium-stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat-badge .s-label { font-size: 8px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; display: block; margin-bottom: 1px; }
  .stat-badge .s-val   { font-size: 13px; font-family: var(--bb); display: block; }
  .empty-slot { flex: 1; background: var(--surface); border: 1px dashed var(--muted); border-radius: 6px; display: flex; align-items: center; justify-content: center; min-height: 100px; font-size: 10px; color: var(--muted); }

  /* TABLE */
  .table-outer { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 4px; }
  .table-wrap { background: var(--surface); }
  .trow { display: grid; padding: 10px 14px; border-bottom: 1px solid var(--border); align-items: center; }
  .trow:last-child { border-bottom: none; }
  .trow.thead { padding: 8px 14px; }
  .trow.thead span { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; }
  .trow.tbody:hover { background: #ffffff08; }
  .cell-rank { font-size: 11px; font-family: var(--bb); }
  .cell-name { font-size: 13px; font-family: var(--bb); color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cell-num  { font-size: 13px; font-family: var(--bb); text-align: center; }
  .cell-rate { font-size: 13px; font-family: var(--bb); text-align: center; }
  .cell-acts { display: flex; gap: 2px; justify-content: flex-end; }
  .closer-grid { grid-template-columns: 28px 140px repeat(6,1fr) 90px 90px 56px; min-width: 700px; }
  .setter-grid { grid-template-columns: 28px 140px repeat(5,1fr) 80px 80px 80px 56px; min-width: 680px; }

  /* REP CARDS — mobile */
  .rep-cards { display: none; flex-direction: column; gap: 8px; }
  .rep-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
  .rc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .rc-left { display: flex; align-items: center; gap: 8px; }
  .rc-rank { font-size: 11px; font-family: var(--bb); min-width: 28px; }
  .rc-info { display: flex; flex-direction: column; }
  .rc-role { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; }
  .rc-name { font-size: 18px; font-family: var(--bb); color: var(--text); }
  .rc-acts { display: flex; }
  .rc-metrics { display: flex; flex-wrap: wrap; gap: 6px; }
  .rc-metric { background: var(--bg); border-radius: 4px; padding: 6px 10px; text-align: center; flex: 1; min-width: 70px; }
  .rc-metric .m-label { font-size: 8px; color: var(--sub); text-transform: uppercase; letter-spacing: .08em; display: block; margin-bottom: 2px; }
  .rc-metric .m-val   { font-size: 15px; font-family: var(--bb); display: block; }

  /* EDIT PANEL */
  .ep-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .ep-role { font-size: 10px; text-transform: uppercase; letter-spacing: .15em; }
  .ep-name-wrap { margin-bottom: 14px; }
  .ep-name-wrap label { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; display: block; margin-bottom: 5px; }
  .ep-name-input { background: transparent; border: 1px solid var(--muted); border-radius: 4px; color: var(--text); font-family: var(--bb); font-size: 18px; padding: 6px 12px; outline: none; width: 100%; max-width: 300px; }
  .ep-fields { display: grid; gap: 10px; margin-bottom: 14px; }
  .ep-field label { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; display: block; margin-bottom: 5px; text-align: center; }
  .ep-field input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--muted); color: var(--text); font-family: var(--bb); font-size: 16px; text-align: center; padding: 4px 0; outline: none; }
  .ep-preview { display: flex; gap: 10px; flex-wrap: wrap; padding: 10px 12px; background: var(--bg); border-radius: 4px; margin-bottom: 14px; }
  .ep-preview .s-label { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; display: block; }
  .ep-preview .s-val   { font-size: 14px; font-family: var(--bb); display: block; }
  .ep-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .save-btn { border: none; border-radius: 4px; padding: 10px 20px; font-family: monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .1em; cursor: pointer; font-weight: 700; color: #000; }
  .del-rep-btn { background: none; border: 1px solid #EF444440; border-radius: 4px; padding: 10px 14px; color: var(--red); font-family: monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .1em; cursor: pointer; margin-left: auto; }

  /* EMPTY STATE */
  #empty-state { text-align: center; padding: 60px 20px; color: var(--sub); }
  .es-title { font-size: 32px; font-family: var(--bb); color: var(--muted); margin-bottom: 8px; }
  .es-sub   { font-size: 11px; margin-bottom: 20px; }
  .es-btns  { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  /* FOOTER */
  #footer { border-top: 1px solid var(--border); padding: 10px 20px; display: flex; gap: 20px; flex-shrink: 0; align-items: center; flex-wrap: wrap; }
  .f-item .f-label { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; margin-right: 8px; }
  .f-item .f-val   { font-size: 16px; font-family: var(--bb); }
  .f-period { margin-left: auto; }

  /* ── PREMIUM ANIMATIONS ── */
  @keyframes headerIn { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
  #header { animation: headerIn .45s cubic-bezier(.22,.68,0,1.2) forwards; position:sticky; top:0; z-index:20; background:rgba(8,8,8,.75); backdrop-filter:blur(28px) saturate(160%); -webkit-backdrop-filter:blur(28px) saturate(160%); box-shadow:0 1px 0 rgba(255,255,255,.05),0 4px 20px rgba(0,0,0,.35); }

  @keyframes tabsIn { from { opacity:0; } to { opacity:1; } }
  #tabs { opacity:0; animation:tabsIn .4s ease .18s forwards; position:sticky; top:57px; z-index:19; background:rgba(8,8,8,.82); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }

  @keyframes footerIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  #footer { animation:footerIn .4s ease .22s both; }

  /* Tab active animated underline — override static border-bottom */
  .tab { border-bottom: 2px solid transparent !important; transition: color .15s, border-color .22s; }
  .tab.active { color:var(--amber); border-bottom-color:var(--amber) !important; }

  /* Podium card entrance */
  @keyframes podiumIn { from { opacity:0; transform:translateY(18px) scale(.96); } to { opacity:1; transform:translateY(0) scale(1); } }
  .podium-card { opacity:0; transition:transform .2s ease, box-shadow .2s ease; position:relative; overflow:hidden; box-shadow:inset 0 1px 0 rgba(255,255,255,.06),inset 0 -1px 0 rgba(0,0,0,.2),0 2px 8px rgba(0,0,0,.3); }
  .podium-card.anim { animation:podiumIn .52s cubic-bezier(.22,.68,0,1.2) forwards; }
  .podium-card:hover { transform:translateY(-3px); box-shadow:0 10px 30px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08); }

  /* Shimmer on podium entrance */
  @keyframes shimmerSweep { 0%{transform:translateX(-100%)} 100%{transform:translateX(230%)} }
  .shimmer-wrap { position:absolute; inset:0; overflow:hidden; border-radius:inherit; pointer-events:none; z-index:0; }
  .shimmer-line { position:absolute; top:0; bottom:0; width:45%; background:linear-gradient(90deg,transparent,rgba(255,255,255,.065),transparent); transform:translateX(-100%); animation:shimmerSweep .9s ease forwards; }

  /* Rank badge pop */
  @keyframes rankPop { 0%{transform:scale(.5);opacity:0} 70%{transform:scale(1.18)} 100%{transform:scale(1);opacity:1} }
  .podium-rank { opacity:0; }
  .podium-rank.anim { animation:rankPop .6s cubic-bezier(.34,1.56,.64,1) forwards; }

  /* Section header reveal */
  @keyframes sectionIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
  .section-hdr { opacity:0; }
  .section-hdr.anim { animation:sectionIn .38s ease forwards; }

  /* Table row slide-up */
  @keyframes rowIn { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
  .trow.tbody { opacity:0; }
  .trow.tbody.anim { animation:rowIn .32s ease forwards; }

  /* Mobile rep card slide-up */
  .rep-card { opacity:0; box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 1px 4px rgba(0,0,0,.2); }
  .rep-card.anim { animation:rowIn .36s ease forwards; }

  /* Ripple on interactive elements */
  .ripple { position:absolute; border-radius:50%; background:rgba(255,255,255,.09); transform:scale(0); animation:rippleOut .6s ease-out forwards; pointer-events:none; }
  @keyframes rippleOut { to{transform:scale(5);opacity:0;} }

  /* Footer value flash on update */
  @keyframes valFlash { 0%{opacity:.4} 100%{opacity:1} }
  .f-val.flash { animation:valFlash .5s ease; }

  /* Breathing border on podium top */
  @keyframes breathBorder { 0%,100%{opacity:.55} 50%{opacity:1} }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    #header { padding: 10px 14px; }
    #header-btns .period-btn { display: none; }
    #content { padding: 12px 14px; }
    #footer { padding: 10px 14px; gap: 14px; }
    .f-period { margin-left: 0; }
    .table-outer { display: none; }
    .rep-cards { display: flex; }
    .podium { flex-wrap: wrap; }
    .podium-card { min-width: calc(50% - 5px); }
    .empty-slot  { min-width: calc(50% - 5px); min-height: 70px; }
  }
</style>
</head>
<body>

<div id="header">
  <div>
    <div class="sub-label">Sales Mastery</div>
    <div class="title">REP <span>LEADERBOARD</span></div>
  </div>
  <div id="header-btns">
    <button class="vb" style="color:var(--red);border-color:#EF444440" onclick="confirmReset()">↺ Reset Period</button>
    <div class="divider"></div>
    <button class="vb" style="color:var(--green);border-color:#22C55E40" onclick="startNew('closer')">+ Closer</button>
    <button class="vb" style="color:var(--blue);border-color:#4A9EFF40"  onclick="startNew('setter')">+ Setter</button>
  </div>
</div>

<div id="tabs">
  <button class="tab active" data-view="closers" onclick="setView('closers')">Closers (<span id="cnt-closers">0</span>)</button>
  <button class="tab"        data-view="setters" onclick="setView('setters')">Setters (<span id="cnt-setters">0</span>)</button>
  <button class="tab"        data-view="all"     onclick="setView('all')">All Reps (<span id="cnt-all">0</span>)</button>
</div>

<div id="content"></div>

<div id="footer" style="display:none">
  <div class="f-item"><span class="f-label">Revenue</span><span class="f-val" id="f-revenue" style="color:var(--amber)">—</span></div>
  <div class="f-item"><span class="f-label">Closes</span><span class="f-val"  id="f-closes"  style="color:var(--green)">—</span></div>
  <div class="f-item"><span class="f-label">Booked</span><span class="f-val"  id="f-booked"  style="color:var(--blue)">—</span></div>
  <div class="f-item"><span class="f-label">Dials</span><span class="f-val"   id="f-dials"   style="color:var(--blue)">—</span></div>
  <div class="f-item f-period"><span class="f-label">Period</span><span class="f-val" id="f-period" style="color:var(--sub)">Monthly</span></div>
</div>

<script>
const SCRIPT_URL = 'INSERT URL HERE';

let reps=[], view='closers', period='Monthly', sortCloser='revenue', sortSetter='booked', editing=null, editBuf=null;

const RANK_COLORS=['#F0A500','#9CA3AF','#CD7F32'];
const RANK_LABELS=['1ST','2ND','3RD'];
const BB="'Bebas Neue', sans-serif";

const CLOSER_FIELDS=[
  {key:'taken',     label:'Calls Taken',    color:'var(--green)'},
  {key:'noshows',   label:'No Shows',       color:'var(--red)'},
  {key:'offers',    label:'Offers',         color:'var(--green)'},
  {key:'followups', label:'Follow Ups',     color:'#6BCB8E'},
  {key:'closes',    label:'Closes',         color:'var(--amber)'},
  {key:'revenue',   label:'Cash Collected', color:'var(--amber)', isMoney:true},
];
const SETTER_FIELDS=[
  {key:'dials',     label:'Dials',          color:'var(--blue)'},
  {key:'pickups',   label:'Pick Ups',       color:'var(--blue)'},
  {key:'proposed',  label:'Proposed',       color:'var(--blue)'},
  {key:'followups', label:'Follow Ups',     color:'#7AB8FF'},
  {key:'booked',    label:'Calls Booked',   color:'var(--amber)'},
];

const fmt = n=>(!n&&n!==0)||!isFinite(n)?'—':Math.round(n).toLocaleString();
const $   = n=>(!n&&n!==0)||!isFinite(n)?'—':'$'+Math.round(n).toLocaleString();
const pct = n=>(!n&&n!==0)||!isFinite(n)?'—':(n*100).toFixed(0)+'%';

function setterStats(r){return{pickupRate:r.dials?r.pickups/r.dials:0,pitchRate:r.pickups?r.proposed/r.pickups:0,bookingRate:r.proposed?r.booked/r.proposed:0};}
function closerStats(r){return{showRate:r.taken?r.taken/(r.taken+(r.noshows||0)):0,offerRate:r.taken?r.offers/r.taken:0,closeRate:r.offers?r.closes/r.offers:0,acv:r.closes?r.revenue/r.closes:0};}

async function loadReps(){
  document.getElementById('content').innerHTML='<div style="text-align:center;padding:60px;color:var(--sub);font-family:'+BB+';font-size:20px;letter-spacing:.1em">LOADING...</div>';
  try{const res=await fetch(SCRIPT_URL,{redirect:'follow'});const text=await res.text();const data=JSON.parse(text);reps=Array.isArray(data)?data:[];}catch(e){reps=[];}
  render();
}
async function saveReps(){
  try{await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(reps)});}catch(e){console.error(e);}
}

function setPeriod(p){period=p;render();}
function setView(v){view=v;render();}
function startNew(role){
  editBuf=role==='closer'?{id:Date.now(),name:'',role:'closer',taken:0,noshows:0,offers:0,followups:0,closes:0,revenue:0}:{id:Date.now(),name:'',role:'setter',dials:0,pickups:0,proposed:0,followups:0,booked:0};
  editing='new';render();
  setTimeout(()=>document.getElementById('edit-panel')?.scrollIntoView({behavior:'smooth'}),50);
}
function startEdit(id){
  editBuf={...reps.find(r=>r.id===id)};editing=id;render();
  setTimeout(()=>document.getElementById('edit-panel')?.scrollIntoView({behavior:'smooth'}),50);
}
function cancelEdit(){editing=null;editBuf=null;render();}
function deleteRep(id){reps=reps.filter(r=>r.id!==id);saveReps();if(editing===id){editing=null;editBuf=null;}render();}
function saveEdit(){
  if(!editBuf||!editBuf.name.trim())return;
  reps=editing==='new'?[...reps,{...editBuf,id:Date.now()}]:reps.map(r=>r.id===editing?{...editBuf}:r);
  saveReps();editing=null;editBuf=null;render();
}
function setField(k,v){if(!editBuf)return;editBuf[k]=v;updatePreview();}
function sorted(list, key) { return [...list].sort((a,b)=>(b[key]||0)-(a[key]||0)); }

function podiumCard(rep,rank,sortKey,isMoney){
  const rc=RANK_COLORS[rank]||'#555';
  const val=isMoney?$(rep[sortKey]):fmt(rep[sortKey]);
  const stats=rep.role==='closer'?(()=>{const st=closerStats(rep);return[{l:'Close%',v:pct(st.closeRate),c:'var(--amber)'},{l:'ACV',v:$(st.acv),c:'var(--green)'},{l:'Offers',v:fmt(rep.offers),c:'var(--green)'}];})():(()=>{const st=setterStats(rep);return[{l:'Book%',v:pct(st.bookingRate),c:'var(--amber)'},{l:'Pick-Up%',v:pct(st.pickupRate),c:'var(--blue)'},{l:'Dials',v:fmt(rep.dials),c:'var(--blue)'}];})();
  return`<div class="podium-card" style="border-top:3px solid ${rc}"><div class="podium-rank" style="color:${rc}">${RANK_LABELS[rank]||'#'+(rank+1)}</div><div class="podium-role">${rep.role}</div><div class="podium-name">${rep.name||'—'}</div><div class="podium-val" style="color:${rc}">${val}</div><div class="podium-stats">${stats.map(s=>`<div class="stat-badge"><span class="s-label">${s.l}</span><span class="s-val" style="color:${s.c}">${s.v}</span></div>`).join('')}</div></div>`;
}

function closerTableRow(rep,i){
  const st=closerStats(rep);const rc=i<3?RANK_COLORS[i]:'#555';
  const cells=CLOSER_FIELDS.map(f=>`<span class="cell-num" style="color:${sortCloser===f.key?f.color:'var(--text)'}">${f.isMoney?$(rep[f.key]):fmt(rep[f.key])}</span>`).join('');
  return`<div class="trow tbody closer-grid" style="background:${i===0?'#F0A50008':'transparent'}"><span class="cell-rank" style="color:${rc}">${i<3?RANK_LABELS[i]:'#'+(i+1)}</span><span class="cell-name">${rep.name}</span>${cells}<span class="cell-rate" style="color:var(--amber)">${pct(st.closeRate)}</span><span class="cell-rate" style="color:var(--green)">${$(st.acv)}</span><div class="cell-acts"><button class="edit-btn" onclick="startEdit(${rep.id})">✎</button><button class="del-btn" onclick="deleteRep(${rep.id})">✕</button></div></div>`;
}

function setterTableRow(rep,i){
  const st=setterStats(rep);const rc=i<3?RANK_COLORS[i]:'#555';
  const cells=SETTER_FIELDS.map(f=>`<span class="cell-num" style="color:${sortSetter===f.key?f.color:'var(--text)'}">${fmt(rep[f.key])}</span>`).join('');
  return`<div class="trow tbody setter-grid" style="background:${i===0?'#F0A50008':'transparent'}"><span class="cell-rank" style="color:${rc}">${i<3?RANK_LABELS[i]:'#'+(i+1)}</span><span class="cell-name">${rep.name}</span>${cells}<span class="cell-rate" style="color:var(--blue)">${pct(st.pickupRate)}</span><span class="cell-rate" style="color:var(--blue)">${pct(st.pitchRate)}</span><span class="cell-rate" style="color:var(--amber)">${pct(st.bookingRate)}</span><div class="cell-acts"><button class="edit-btn" onclick="startEdit(${rep.id})">✎</button><button class="del-btn" onclick="deleteRep(${rep.id})">✕</button></div></div>`;
}

function closerCard(rep,i){
  const st=closerStats(rep);const rc=i<3?RANK_COLORS[i]:'#555';
  const metrics=[...CLOSER_FIELDS.map(f=>({l:f.label,v:f.isMoney?$(rep[f.key]):fmt(rep[f.key]),c:sortCloser===f.key?f.color:'var(--text)'})),{l:'Close%',v:pct(st.closeRate),c:'var(--amber)'},{l:'ACV',v:$(st.acv),c:'var(--green)'}];
  return`<div class="rep-card" style="border-left:3px solid ${rc}"><div class="rc-top"><div class="rc-left"><span class="rc-rank" style="color:${rc}">${i<3?RANK_LABELS[i]:'#'+(i+1)}</span><div class="rc-info"><span class="rc-role">closer</span><span class="rc-name">${rep.name}</span></div></div><div class="rc-acts"><button class="edit-btn" onclick="startEdit(${rep.id})">✎</button><button class="del-btn" onclick="deleteRep(${rep.id})">✕</button></div></div><div class="rc-metrics">${metrics.map(m=>`<div class="rc-metric"><span class="m-label">${m.l}</span><span class="m-val" style="color:${m.c}">${m.v}</span></div>`).join('')}</div></div>`;
}

function setterCard(rep,i){
  const st=setterStats(rep);const rc=i<3?RANK_COLORS[i]:'#555';
  const metrics=[...SETTER_FIELDS.map(f=>({l:f.label,v:fmt(rep[f.key]),c:sortSetter===f.key?f.color:'var(--text)'})),{l:'Pick-Up%',v:pct(st.pickupRate),c:'var(--blue)'},{l:'Pitch%',v:pct(st.pitchRate),c:'var(--blue)'},{l:'Book%',v:pct(st.bookingRate),c:'var(--amber)'}];
  return`<div class="rep-card" style="border-left:3px solid ${rc}"><div class="rc-top"><div class="rc-left"><span class="rc-rank" style="color:${rc}">${i<3?RANK_LABELS[i]:'#'+(i+1)}</span><div class="rc-info"><span class="rc-role">setter</span><span class="rc-name">${rep.name}</span></div></div><div class="rc-acts"><button class="edit-btn" onclick="startEdit(${rep.id})">✎</button><button class="del-btn" onclick="deleteRep(${rep.id})">✕</button></div></div><div class="rc-metrics">${metrics.map(m=>`<div class="rc-metric"><span class="m-label">${m.l}</span><span class="m-val" style="color:${m.c}">${m.v}</span></div>`).join('')}</div></div>`;
}

function buildPreviewHtml(buf){
  if(!buf)return'';
  if(buf.role==='closer'){const st=closerStats(buf);return[{l:'Show Rate',v:pct(st.showRate),c:'var(--green)'},{l:'Offer Rate',v:pct(st.offerRate),c:'var(--green)'},{l:'Close Rate',v:pct(st.closeRate),c:'var(--amber)'},{l:'ACV',v:$(st.acv),c:'var(--amber)'}].map(s=>`<div><span class="s-label">${s.l}</span><span class="s-val" style="color:${s.c}">${s.v}</span></div>`).join('');}
  else{const st=setterStats(buf);return[{l:'Pick-Up Rate',v:pct(st.pickupRate),c:'var(--blue)'},{l:'Pitch Rate',v:pct(st.pitchRate),c:'var(--blue)'},{l:'Booking Rate',v:pct(st.bookingRate),c:'var(--amber)'}].map(s=>`<div><span class="s-label">${s.l}</span><span class="s-val" style="color:${s.c}">${s.v}</span></div>`).join('');}
}
function updatePreview(){const el=document.getElementById('ep-preview');if(el&&editBuf)el.innerHTML=buildPreviewHtml(editBuf);}

function editPanel(){
  if(!editBuf)return'';
  const isCloser=editBuf.role==='closer';
  const color=isCloser?'var(--green)':'var(--blue)';
  const fields=isCloser?CLOSER_FIELDS:SETTER_FIELDS;
  const cols=window.innerWidth<480?3:fields.length;
  return`<div id="edit-panel" style="background:var(--surface);border:1px solid ${isCloser?'#22C55E':'#4A9EFF'}40;border-left:3px solid ${color};border-radius:6px;padding:16px;margin-bottom:20px"><div class="ep-hdr"><span class="ep-role" style="color:${color}">${editing==='new'?'New':'Edit'} ${editBuf.role}</span><button class="del-btn" onclick="cancelEdit()">✕</button></div><div class="ep-name-wrap"><label>Rep Name</label><input class="ep-name-input" type="text" placeholder="Enter name..." value="${editBuf.name}" oninput="editBuf.name=this.value" /></div><div class="ep-fields" style="grid-template-columns:repeat(${cols},1fr)">${fields.map(f=>`<div class="ep-field"><label style="color:${f.color}">${f.label}</label><input type="number" min="0" placeholder="0" value="${editBuf[f.key]||''}" oninput="setField('${f.key}',Number(this.value)||0)" /></div>`).join('')}</div><div class="ep-preview" id="ep-preview">${buildPreviewHtml(editBuf)}</div><div class="ep-actions"><button class="save-btn" style="background:${color}" onclick="saveEdit()">Save Rep</button><button class="vb" onclick="cancelEdit()">Cancel</button>${editing!=='new'?`<button class="del-rep-btn" onclick="deleteRep(${editBuf.id});cancelEdit()">Delete</button>`:''}</div></div>`;
}

function render(){
  const closers=reps.filter(r=>r.role==='closer');
  const setters=reps.filter(r=>r.role==='setter');
  const sc=sorted(closers,sortCloser);
  const ss=sorted(setters,sortSetter);

  document.getElementById('cnt-closers').textContent=closers.length;
  document.getElementById('cnt-setters').textContent=setters.length;
  document.getElementById('cnt-all').textContent=reps.length;
  document.querySelectorAll('#header-btns .vb.period-btn').forEach(b=>b.classList.toggle('act',b.textContent===period));
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===view));

  const footer=document.getElementById('footer');
  footer.style.display=reps.length?'flex':'none';
  if(reps.length){
    document.getElementById('f-revenue').textContent=$(closers.reduce((a,r)=>a+(r.revenue||0),0));
    document.getElementById('f-closes').textContent=fmt(closers.reduce((a,r)=>a+(r.closes||0),0));
    document.getElementById('f-booked').textContent=fmt(setters.reduce((a,r)=>a+(r.booked||0),0));
    document.getElementById('f-dials').textContent=fmt(setters.reduce((a,r)=>a+(r.dials||0),0));
    document.getElementById('f-period').textContent=period;
  }

  let html='';
  if(editing)html+=editPanel();

  if(reps.length===0&&!editing){
    html+=`<div id="empty-state"><div class="es-title">NO REPS YET</div><div class="es-sub">Add your first closer or setter to get started</div><div class="es-btns"><button class="vb" style="color:var(--green);border-color:#22C55E50;padding:10px 20px" onclick="startNew('closer')">+ Add Closer</button><button class="vb" style="color:var(--blue);border-color:#4A9EFF50;padding:10px 20px" onclick="startNew('setter')">+ Add Setter</button></div></div>`;
  }

  if((view==='closers'||view==='all')&&closers.length>0){
    const sortBtns=CLOSER_FIELDS.map(f=>`<button class="sb${sortCloser===f.key?' act':''}" onclick="sortCloser='${f.key}';render()">${f.label}</button>`).join('');
    let podium=sc.slice(0,3).map((r,i)=>podiumCard(r,i,sortCloser,CLOSER_FIELDS.find(f=>f.key===sortCloser)?.isMoney)).join('');
    for(let i=sc.length;i<3;i++)podium+='<div class="empty-slot">Empty slot</div>';
    const thCells=['#','Name',...CLOSER_FIELDS.map(f=>f.label),'Close%','ACV',''].map((h,i)=>`<span style="text-align:${i>1?'center':'left'}">${h}</span>`).join('');
    html+=`<div style="margin-bottom:28px"><div class="section-hdr"><div class="section-bar" style="background:var(--green)"></div><span class="section-label">Closers — ${period} — Ranked by</span><div class="sort-btns">${sortBtns}</div></div><div class="podium">${podium}</div><div class="table-outer"><div class="table-wrap"><div class="trow thead closer-grid">${thCells}</div>${sc.map((r,i)=>closerTableRow(r,i)).join('')}</div></div><div class="rep-cards">${sc.map((r,i)=>closerCard(r,i)).join('')}</div></div>`;
  }

  if((view==='setters'||view==='all')&&setters.length>0){
    const sortBtns=SETTER_FIELDS.map(f=>`<button class="sb${sortSetter===f.key?' act':''}" onclick="sortSetter='${f.key}';render()">${f.label}</button>`).join('');
    let podium=ss.slice(0,3).map((r,i)=>podiumCard(r,i,sortSetter,false)).join('');
    for(let i=ss.length;i<3;i++)podium+='<div class="empty-slot">Empty slot</div>';
    const thCells=['#','Name',...SETTER_FIELDS.map(f=>f.label),'Pick-Up%','Pitch%','Book%',''].map((h,i)=>`<span style="text-align:${i>1?'center':'left'}">${h}</span>`).join('');
    html+=`<div style="margin-bottom:28px"><div class="section-hdr"><div class="section-bar" style="background:var(--blue)"></div><span class="section-label">Setters — ${period} — Ranked by</span><div class="sort-btns">${sortBtns}</div></div><div class="podium">${podium}</div><div class="table-outer"><div class="table-wrap"><div class="trow thead setter-grid">${thCells}</div>${ss.map((r,i)=>setterTableRow(r,i)).join('')}</div></div><div class="rep-cards">${ss.map((r,i)=>setterCard(r,i)).join('')}</div></div>`;
  }

  if(!editing&&reps.length>0){
    if(view==='closers'&&closers.length===0)html+=`<div style="text-align:center;padding:40px;color:var(--sub)"><div style="font-size:28px;font-family:${BB};color:var(--muted);margin-bottom:8px">NO CLOSERS YET</div><button class="vb" style="color:var(--green)" onclick="startNew('closer')">+ Add Closer</button></div>`;
    if(view==='setters'&&setters.length===0)html+=`<div style="text-align:center;padding:40px;color:var(--sub)"><div style="font-size:28px;font-family:${BB};color:var(--muted);margin-bottom:8px">NO SETTERS YET</div><button class="vb" style="color:var(--blue)" onclick="startNew('setter')">+ Add Setter</button></div>`;
  }

  document.getElementById('content').innerHTML=html;

  // ── Trigger entrance animations ──
  requestAnimationFrame(()=>{
    // Section headers
    document.querySelectorAll('.section-hdr').forEach((el,i)=>{
      el.style.animationDelay=(i*0.06)+'s';
      el.classList.add('anim');
    });

    // Podium cards cascade
    document.querySelectorAll('.podium-card').forEach((el,i)=>{
      el.style.animationDelay=(.04+i*.09)+'s';
      el.classList.add('anim');
      // Shimmer
      const sw=document.createElement('div');sw.className='shimmer-wrap';
      const sl=document.createElement('div');sl.className='shimmer-line';
      sw.appendChild(sl);el.appendChild(sw);
      sl.style.animationDelay=(.15+i*.09)+'s';
      // Rank badge
      const rk=el.querySelector('.podium-rank');
      if(rk){rk.style.animationDelay=(.25+i*.09)+'s';rk.classList.add('anim');}
    });

    // Table rows stagger
    document.querySelectorAll('.trow.tbody').forEach((el,i)=>{
      el.style.animationDelay=(.08+i*.04)+'s';
      el.classList.add('anim');
    });

    // Mobile rep cards stagger
    document.querySelectorAll('.rep-card').forEach((el,i)=>{
      el.style.animationDelay=(.06+i*.05)+'s';
      el.classList.add('anim');
    });

    // Footer value flash
    document.querySelectorAll('.f-val').forEach(el=>{
      el.classList.remove('flash');
      void el.offsetWidth;
      el.classList.add('flash');
    });
  });
}

// Ripple helper
document.addEventListener('click',function(e){
  const target=e.target.closest('.vb,.sb,.tab,.podium-card');
  if(!target)return;
  const r=document.createElement('span');r.className='ripple';
  const rect=target.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  r.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  target.style.position='relative';target.style.overflow='hidden';
  target.appendChild(r);
  setTimeout(()=>r.remove(),700);
});

loadReps();
</script>
</body>
</html>
